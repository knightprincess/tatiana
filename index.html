<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Tati</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

        /* RESETEO BÁSICO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Mono', monospace;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* FONDO RESPONSIVO */
        #fondo-body {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('fondo.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* PANTALLA NEGRA RECHAZO */
        #pantalla-negra {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            z-index: 9999;
            letter-spacing: 2px;
        }

        /* LANDING PAGE */
        #landing-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* EFECTO BLUR ZINE */
        #zine-blur-container {
            position: absolute;
            width: 80%;
            max-width: 300px;
            z-index: 2;
        }
        #zine-fondo {
            width: 100%;
            height: auto;
            opacity: 0.6;
            filter: blur(4px); 
        }

        /* IMÁGENES LANDING */
        #nombre-tatiana {
            width: 80%;
            max-width: 350px;
            z-index: 3;
            margin-bottom: 20px;
        }

        #pregunta-img {
            width: 60%;
            max-width: 250px;
            z-index: 3;
            opacity: 0; 
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* BOTONES LANDING */
        #botones-landing {
            margin-top: 30px;
            z-index: 100; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 1s ease;
            display: flex;
            gap: 20px;
        }
        button {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid #fff;
            padding: 12px 30px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover { background: #fff; color: #000; }

        /* CONTENEDOR ZINE */
        #zine-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; 
            z-index: 50;
        }

        .page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto; 
        }

        .img-zine {
            max-width: 100%;
            max-height: 80vh; 
            object-fit: contain;
        }

        .next-btn {
            margin-top: 20px;
            font-style: italic;
            border: none;
            border-bottom: 1px solid #fff;
            border-radius: 0;
            background: transparent;
        }
        .next-btn:hover { background: transparent; color: #ccc; border-color: #ccc; }

        /* EL SOL Y YOUTUBE (PAGINA 9) */
        #palabra-sol {
            position: absolute;
            cursor: pointer;
            color: transparent; 
            width: 80px;  
            height: 80px; 
            top: 50%;     
            left: 50%;    
            transform: translate(-50%, -50%);
            z-index: 60;
        }

        #youtube-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 180px;
            z-index: 70;
            display: none;
            box-shadow: 0px 0px 30px rgba(255, 200, 100, 0.4);
            border-radius: 10px;
            overflow: hidden;
            background: black;
        }
        iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }

        /* ESTILOS DEL BOTÓN VOLVER AL INICIO */
        #btn-volver {
            width: 50px; /* Es chiquito. Ajustá el tamaño acá si hace falta */
            margin-top: 30px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease; /* Aparece muy suavemente */
        }

    </style>
</head>
<body>

    <div id="fondo-body"></div>

    <div id="pantalla-negra">
        <p>No es para vos.</p>
    </div>

    <div id="landing-page">
        <div id="zine-blur-container">
            <img src="portada.png" id="zine-fondo" alt="Fondo Zine">
        </div>
        <img src="tatiana.png" id="nombre-tatiana" alt="Tatiana">
        <img src="pregunta.png" id="pregunta-img" alt="¿Este es tu nombre?">
        <div id="botones-landing">
            <button onclick="empezarZine()">Sí</button>
            <button onclick="rechazar()">No</button>
        </div>
    </div>

    <div id="zine-container">
        <div class="page active" id="page-1"><img src="pagina1.png" class="img-zine"><button class="next-btn" onclick="nextPage(1)">Siguiente</button></div>
        <div class="page" id="page-2"><img src="pagina2.png" class="img-zine"><button class="next-btn" onclick="nextPage(2)">Siguiente</button></div>
        <div class="page" id="page-3"><img src="pagina3.png" class="img-zine"><button class="next-btn" onclick="nextPage(3)">Siguiente</button></div>
        <div class="page" id="page-4"><img src="pagina4.png" class="img-zine"><button class="next-btn" onclick="nextPage(4)">Siguiente</button></div>
        <div class="page" id="page-5"><img src="pagina5.png" class="img-zine"><button class="next-btn" onclick="nextPage(5)">Siguiente</button></div>
        <div class="page" id="page-6"><img src="pagina6.png" class="img-zine"><button class="next-btn" onclick="nextPage(6)">Siguiente</button></div>
        <div class="page" id="page-7"><img src="pagina7.png" class="img-zine"><button class="next-btn" onclick="nextPage(7)">Siguiente</button></div>
        <div class="page" id="page-8"><img src="pagina8.png" class="img-zine"><button class="next-btn" onclick="nextPage(8)">Siguiente</button></div>
        
        <div class="page" id="page-9">
            <img src="pagina9.png" class="img-zine">
            <div id="palabra-sol" onclick="abrirVideo(event)"></div>
            <div id="youtube-container">
                <iframe id="video-iframe" src="https://www.youtube.com/embed/TU_ID_DE_VIDEO?enablejsapi=1&loop=1&playlist=TU_ID_DE_VIDEO&controls=0"></iframe>
            </div>
            <button class="next-btn" onclick="nextPage(9)" style="position:absolute; bottom: 20px;">Siguiente</button>
        </div>

        <div class="page" id="page-10"><img src="pagina10.png" class="img-zine"><button class="next-btn" onclick="nextPage(10)">Siguiente</button></div>
        <div class="page" id="page-11"><img src="pagina11.png" class="img-zine"><button class="next-btn" onclick="nextPage(11)">Siguiente</button></div>
        
        <div class="page" id="page-12">
            <img src="pagina12.png" class="img-zine">
            <div style="margin-top: 20px; display: flex; gap: 20px;">
                <button onclick="aceptarPropuesta()">Sí</button>
                <button onclick="aceptarPropuesta()">Obvio</button>
            </div>
            
            <img src="boton-volver.png" id="btn-volver" onclick="reiniciarTodo()" alt="Volver al inicio">
        </div>

    </div>

    <script>
        function iniciarTimersLanding() {
            // Reinicia los estados por si viene del botón "Volver"
            document.getElementById('pregunta-img').style.opacity = '0';
            document.getElementById('pregunta-img').style.transform = 'translateY(20px)';
            document.getElementById('botones-landing').style.opacity = '0';
            document.getElementById('botones-landing').style.pointerEvents = 'none';

            // Timer de 4 segundos
            setTimeout(() => {
                let pregunta = document.getElementById('pregunta-img');
                pregunta.style.opacity = '1';
                pregunta.style.transform = 'translateY(0)';
            }, 4000);

            // Timer de 6 segundos
            setTimeout(() => {
                let botones = document.getElementById('botones-landing');
                botones.style.opacity = '1';
                botones.style.pointerEvents = 'auto'; 
            }, 6000);
        }

        document.addEventListener("DOMContentLoaded", function() {
            iniciarTimersLanding();
        });

        function rechazar() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('fondo-body').style.display = 'none';
            document.getElementById('pantalla-negra').style.display = 'flex';
        }

        function empezarZine() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('fondo-body').style.display = 'none';
            let zine = document.getElementById('zine-container');
            zine.style.display = 'block';
        }

        function nextPage(current) {
            document.getElementById('page-' + current).classList.remove('active');
            let next = current + 1;
            let nxtElement = document.getElementById('page-' + next);
            if (nxtElement) {
                nxtElement.classList.add('active');
            }
        }

        function abrirVideo(event) {
            event.stopPropagation();
            document.getElementById('youtube-container').style.display = 'block';
        }

        document.addEventListener('click', function(event) {
            let contenedorVideo = document.getElementById('youtube-container');
            let palabraSol = document.getElementById('palabra-sol');

            if (contenedorVideo.style.display === 'block' && 
                !contenedorVideo.contains(event.target) && 
                event.target !== palabraSol) {
                
                contenedorVideo.style.display = 'none';
                let iframe = document.getElementById('video-iframe');
                let src = iframe.src;
                iframe.src = src; 
            }
        });

        // --- NUEVAS FUNCIONES PARA EL FINAL --- //

        function aceptarPropuesta() {
            // 1. Sale tu mensaje dominante y tierno de siempre
            alert('Llamame ya mismo.'); 

            // 2. Empieza a correr el reloj: a los 6000 milisegundos (6 segundos) aparece el botón de volver
            setTimeout(() => {
                let btnVolver = document.getElementById('btn-volver');
                btnVolver.style.opacity = '1';
                btnVolver.style.pointerEvents = 'auto';
            }, 6000);
        }

        function reiniciarTodo() {
            // Oculta el botón de volver para la próxima vez
            let btnVolver = document.getElementById('btn-volver');
            btnVolver.style.opacity = '0';
            btnVolver.style.pointerEvents = 'none';

            // Oculta el zine
            document.getElementById('zine-container').style.display = 'none';
            
            // Vuelve a la página 1 del zine (escondido) para que esté listo si entra de nuevo
            let paginas = document.querySelectorAll('.page');
            paginas.forEach(p => p.classList.remove('active'));
            document.getElementById('page-1').classList.add('active');

            // Muestra el fondo y el landing page
            document.getElementById('fondo-body').style.display = 'block';
            document.getElementById('landing-page').style.display = 'flex';

            // Arranca de cero los timers de los 4 y 6 segundos del inicio
            iniciarTimersLanding();
        }
    </script>
</body>
</html>
