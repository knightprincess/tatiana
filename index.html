<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Tati</title>
    <style>
        /* RESETEO BÁSICO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: monospace; /* Fuente segura para todos los celulares */
            overflow: hidden; 
            height: 100vh; width: 100vw;
        }

        /* FONDO RESPONSIVO LANDING */
        #fondo-body {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('fondo.jpg'); 
            background-size: cover; background-position: center;
            z-index: 1;
        }

        /* PANTALLA NEGRA RECHAZO */
        #pantalla-negra {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: none; justify-content: center; align-items: center;
            font-size: 1.5rem; z-index: 9999; letter-spacing: 2px;
        }

        /* LANDING PAGE (Contenedor principal) */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        /* SECCIÓN CENTRAL: CENTRO CENTRO (Tatiana y Zine Blur) */
        #centro-landing {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }
        #zine-fondo {
            position: absolute;
            width: 250px; height: auto;
            opacity: 0.5; filter: blur(5px);
            z-index: 2;
        }
        #nombre-tatiana {
            position: absolute;
            width: 80%; max-width: 350px;
            z-index: 3;
        }

        /* SECCIÓN INFERIOR: TEXTOS Y BOTONES (ABAJO ÚNICAMENTE) */
        #inferior-landing {
            position: absolute; bottom: 10%; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; 
        }

        #pregunta-texto {
            font-size: 1.2rem; margin-bottom: 20px;
            opacity: 0; transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            text-shadow: 0px 2px 5px rgba(0,0,0,0.8);
        }

        #botones-landing {
            opacity: 0; pointer-events: none; 
            transition: opacity 1s ease;
            display: flex; gap: 20px;
        }
        button {
            background: rgba(0, 0, 0, 0.7); color: #fff;
            border: 1px solid #fff; padding: 12px 30px;
            font-family: monospace; cursor: pointer;
            border-radius: 5px; transition: background 0.3s;
            backdrop-filter: blur(2px); font-size: 1rem;
        }
        button:hover { background: #fff; color: #000; }

        /* CONTENEDOR DEL ZINE */
        #zine-wrapper {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 50;
        }

        /* ÁREAS DE CLIC PARA PASAR PÁGINAS (Izquierda y Derecha) */
        .zona-clic {
            position: absolute; top: 0; height: 100%; width: 40%;
            z-index: 80; cursor: pointer;
        }
        #clic-izq { left: 0; }
        #clic-der { right: 0; }

        /* LAS PÁGINAS (Animación E-Book) */
        #zine-book {
            position: relative; width: 100%; max-width: 500px; height: 100%;
            margin: 0 auto; overflow: hidden;
        }
        .page-zine {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-position: center; background-repeat: no-repeat;
            background-color: #000;
            opacity: 0; transform: translateX(50px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none
