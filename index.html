<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Tati</title>
    <style>
        /* CARGAMOS TU FUENTE DESCARGADA */
        @font-face {
            font-family: 'FuenteTati'; 
            src: url('fonts/fuente-tati.otf'); 
        }

        /* RESETEO BÁSICO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505; 
            color: #fff;
            font-family: 'FuenteTati'; 
            overflow: hidden; 
            height: 100vh; width: 100vw;
        }

        /* FONDO PRINCIPAL (CARPETA IMG) */
        #fondo-body {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/bg02.jpg'); 
            background-size: cover; background-position: center;
            z-index: 1;
        }

        /* PANTALLA NEGRA RECHAZO */
        #pantalla-negra {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/bg02.jpg'); 
            background-size: cover; background-position: center;
            font-size: 1.0rem; 
            color: #dc9cad; 
            display: none; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            z-index: 9999;
        }

        /* FLECHA PARA VOLVER (Pantalla Negra) */
        .flecha-volver {
            margin-top: 30px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .flecha-volver:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* LANDING PAGE */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        /* SECCIÓN CENTRAL: CENTRO CENTRO */
        #centro-landing {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }
        
        #zine-fondo {
            position: absolute; width: 250px; height: auto;
            opacity: 0.5; filter: blur(5px); z-index: 2;
        }
        #nombre-tatiana {
            position: absolute; width: 90%; max-width: 680px; z-index: 3; 
        }

        /* SECCIÓN INFERIOR: TEXTOS Y BOTONES ABAJO */
        #inferior-landing {
            position: absolute; bottom: 10%; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 100; 
        }

        /* TEXTO CURSIVO Y ELEGANTE */
        #pregunta-texto {
            font-family: 'FuenteTati', cursive; 
            font-size: 0.9rem; 
            color: #dc9cad; 
            margin-bottom: 12px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 1s ease, transform 1s ease; 
            text-shadow: 0px 1px 3px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        #botones-landing {
            opacity: 0; pointer-events: none; transition: opacity 1s ease; display: flex; gap: 20px;
        }
        
        /* BOTONES TRANSPARENTES (SOLO BORDE) */
        button {
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px); 
            color: #dc9cad; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 8px 25px; 
            font-family: 'FuenteTati'; 
            cursor: pointer;
            border-radius: 5px; 
            transition: all 0.3s ease; 
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        button:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 1);
        }

        /* CONTENEDOR GENERAL DEL MODO LECTURA DEL ZINE */
        #zine-wrapper {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* ACÁ CARGA LA NUEVA IMAGEN DE FONDO PARA CUANDO LEE EL ZINE */
            background-image: url('img/fondo-lectura.jpg');
            background-size: cover; background-position: center;
            background-color: #070707; /* Color de respaldo si no hay imagen */
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        /* CONTENEDOR INTERNO DEL FLIPBOOK */
        .contenedor-zine {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* ESTILOS DE LAS PÁGINAS DEL FLIPBOOK */
        .page {
            background-color: white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1); 
            overflow: hidden;
            position: relative;
        }

        .page img.bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; 
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* PÁGINA FINAL 12 */
        #page-12-content {
            width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10; position: relative; 
        }
        .final-p { 
            font-family: 'FuenteTati', cursive; 
            font-size: 2.5rem; 
            text-align: center; 
            margin-bottom: 20px; 
            text-shadow: 0px 2px 5px rgba(0,0,0,0.8);
            color: #dc9cad;
        }
        
        #btn-volver {
            width: 40px; margin-top: 20px; cursor: pointer;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div id="fondo-body"></div>

    <div id="pantalla-negra">
        <p>Извините, это не для тебя</p>
        
        <div class="flecha-volver" onclick="volverInicio()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc9cad" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"></path>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </div>
    </div>

    <div id="landing-page">
        <div id="centro-landing">
            <img src="img/tatiana.png" id="nombre-tatiana" alt="Tatiana">
        </div>

        <div id="inferior-landing">
            <p id="pregunta-texto">Это ты?</p>
            <div id="botones-landing">
                <button onclick="empezarZine()">Да</button>
                <button onclick="rechazar()">Нет</button>
            </div>
        </div>
    </div>

    <div id="zine-wrapper">
        <div class="contenedor-zine">
            <div id="flipbook">
                <div class="page"><img src="zine-imagenes/portada.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p2.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p3.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p4.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p5.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p6.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p7.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p8.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p9.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p10.png" class="bg-img"></div>
                <div class="page"><img src="zine-imagenes/p11.png" class="bg-img"></div>
                
                <div class="page" id="page-12">
                    <img src="zine-imagenes/p12.png" class="bg-img">
                    <div id="page-12-content">
                        <p class="final-p">¿Querés ser mi novia?</p>
                        <div style="display: flex; gap: 15px;">
                            <button onclick="aceptarPropuesta(event)">Sí</button>
                            <button onclick="aceptarPropuesta(event)">Obvio</button>
                        </div>
                        <img src="img/boton-volver.png" id="btn-volver" onclick="reiniciarTodo(event)" alt="Volver al inicio">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script>
        let myFlipBook = null;

        function iniciarTimersLanding() {
            document.getElementById('pregunta-texto').style.opacity = '0';
            document.getElementById('pregunta-texto').style.transform = 'translateY(20px)';
            document.getElementById('botones-landing').style.opacity = '0';
            document.getElementById('botones-landing').style.pointerEvents = 'none';

            setTimeout(function() {
                document.getElementById('pregunta-texto').style.opacity = '1';
                document.getElementById('pregunta-texto').style.transform = 'translateY(0)';
            }, 4000);

            setTimeout(function() {
                document.getElementById('botones-landing').style.opacity = '1';
                document.getElementById('botones-landing').style.pointerEvents = 'auto';
            }, 6000);
        }

        window.onload = function() {
            iniciarTimersLanding();
        };

        function rechazar() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('fondo-body').style.display = 'none';
            document.getElementById('pantalla-negra').style.display = 'flex';
        }

        // NUEVA FUNCIÓN: Volver del rechazo
        function volverInicio() {
            document.getElementById('pantalla-negra').style.display = 'none';
            document.getElementById('fondo-body').style.display = 'block';
            document.getElementById('landing-page').style.display = 'block';
            iniciarTimersLanding(); // Reinicia la animación de los 4 y 6 segundos
        }

        function empezarZine() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('fondo-body').style.display = 'none';
            document.getElementById('zine-wrapper').style.display = 'flex';

            // Inicializa el libro solo la primera vez que entra
            if (!myFlipBook) {
                myFlipBook = new St.PageFlip(document.getElementById('flipbook'), {
                    width: 1252,          
                    height: 1783,         
                    size: "stretch",     
                    minWidth: 315,
                    maxWidth: 1000,
                    minHeight: 420,
                    maxHeight: 1350,
                    maxShadowOpacity: 0.5, 
                    showCover: true,     
                    mobileScrollSupport: false 
                });
                myFlipBook.loadFromHTML(document.querySelectorAll('.page'));
            }
        }

        function aceptarPropuesta(event) {
            event.stopPropagation(); 
            alert('Llamame ya mismo.'); 

            setTimeout(() => {
                let btnVolver = document.getElementById('btn-volver');
                btnVolver.style.opacity = '1';
                btnVolver.style.pointerEvents = 'auto';
            }, 6000);
        }

        function reiniciarTodo(event) {
            event.stopPropagation();
            
            let btnVolver = document.getElementById('btn-volver');
            btnVolver.style.opacity = '0';
            btnVolver.style.pointerEvents = 'none';

            document.getElementById('zine-wrapper').style.display = 'none';
            
            // Si el libro está cargado, lo volvemos a la página 0 (la portada)
            if (myFlipBook) {
                myFlipBook.turnToPage(0);
            }

            document.getElementById('fondo-body').style.display = 'block';
            document.getElementById('landing-page').style.display = 'block';

            iniciarTimersLanding();
        }
    </script>
</body>
</html>
